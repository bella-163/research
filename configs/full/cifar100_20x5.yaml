seed: 42

data:
  dataset: cifar100
  root: ./data
  image_size: 224
  download: true
  class_order: seeded
  class_order_seed: 1993
  num_tasks: 20
  classes_per_task: 5
  max_train_per_class: null
  max_test_per_class: null
  num_workers: 4

model:
  name: vit_base_patch16_224
  pretrained: true
  allow_random_fallback: false
  checkpoint: null
  lora:
    rank: 8
    alpha: 16
    dropout: 0.05
    target_modules: ["attn.qkv"]

training:
  epochs: 8
  batch_size: 64
  lr: 0.0005
  weight_decay: 0.0001
  train_head: true
  amp: true

method:
  name: adaptive
  rho: 0.5
  gamma_min: 0.5
  gamma_max: 1.5
  grad_batches: 3

evaluation:
  classifier: ncm
  save_features_for_drift: true
