seed: 42

data:
  dataset: cifar100
  root: ./data
  image_size: 224
  download: true
  class_order: sequential
  num_tasks: 5
  classes_per_task: 2
  max_train_per_class: 20
  max_test_per_class: 20
  num_workers: 2

model:
  name: vit_tiny_patch16_224
  pretrained: true
  allow_random_fallback: true
  checkpoint: null
  lora:
    rank: 4
    alpha: 8
    dropout: 0.0
    target_modules: ["attn.qkv"]

training:
  epochs: 1
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  train_head: true
  amp: false

method:
  name: adaptive
  rho: 0.5
  gamma_min: 0.5
  gamma_max: 1.5
  grad_batches: 1

evaluation:
  classifier: ncm
  save_features_for_drift: true
